<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>南非N3公路工程 Excel 智能翻译工具</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; max-width: 900px; margin: 0 auto; background: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .api-config { background: #f8f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #d5dbdb; display: flex; flex-direction: column; gap: 10px; }
        .input-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .input-group label { width: 100px; font-weight: bold; color: #34495e; font-size: 14px; }
        .input-group input, .input-group select { flex: 1; padding: 8px; border: 1px solid #bdc3c7; border-radius: 4px; outline: none; min-width: 150px; }
        .input-group input:focus { border-color: #3498db; }
        .btn-test { padding: 6px 16px; background: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .btn-test:hover { background: #27ae60; }
        .btn-test:disabled { background: #95a5a6; cursor: not-allowed; }
        .test-result { margin-left: 10px; font-size: 14px; font-weight: bold; }
        .test-result.success { color: #27ae60; }
        .test-result.error { color: #e74c3c; }
        
        .options-container { margin: 20px 0; display: flex; flex-direction: column; gap: 15px; background: #e8f8f5; padding: 20px; border-radius: 8px; }
        .option-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .option-label-title { font-size: 15px; font-weight: bold; color: #2c3e50; width: 100px; }
        .radio-label { font-size: 16px; font-weight: bold; color: #16a085; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        
        #drop-zone { border: 2px dashed #3498db; padding: 40px; text-align: center; cursor: pointer; border-radius: 10px; background: #ebf5fb; transition: all 0.3s ease; font-weight: bold; color: #2980b9; }
        #drop-zone:hover { background: #d6eaf8; border-color: #2980b9; }
        .progress-container { margin-top: 20px; display: none; }
        .progress-bar-bg { width: 100%; background-color: #eee; border-radius: 20px; overflow: hidden; height: 20px; }
        .progress-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #3498db, #2ecc71); transition: width 0.2s; }
        .status-text { margin-top: 10px; font-weight: bold; color: #34495e; display: flex; justify-content: space-between; }
        .time-info { display: flex; justify-content: flex-end; gap: 30px; margin-top: 8px; color: #2c3e50; font-size: 0.95em; flex-wrap: wrap; }
        .time-info span { background: #ecf0f1; padding: 4px 12px; border-radius: 20px; }
        .info { color: #7f8c8d; font-size: 0.85em; margin-top: 15px; background: #fdf2e9; padding: 10px; border-left: 4px solid #e67e22; line-height: 1.6; }
        .footer { margin-top: 30px; text-align: center; color: #bdc3c7; font-size: 14px; border-top: 1px solid #ecf0f1; padding-top: 15px; }
        .warning { background: #f9e79f; padding: 8px 12px; border-radius: 6px; margin-bottom: 10px; font-size: 0.9em; color: #7d6608; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Excel 工程翻译工具 <small style="font-size:0.5em;color:#7f8c8d;">   (作者：中交二公局-汤剑辉 202603)</h5>

        <div class="warning">

        </div>

        <div class="api-config">
            <div class="input-group">
                <label for="api-key">Kimi API Key:</label>
                <input type="password" id="api-key" placeholder="请输入 sk- 开头的 Kimi 密钥">
                <button id="btn-test-api" class="btn-test">测试连接</button>
                <span id="test-result" class="test-result"></span>
            </div>
            <div class="input-group">
                <label for="model-select">选择 Kimi 模型:</label>
                <select id="model-select">
                    <option value="moonshot-v1-8k">moonshot-v1-8k</option>
                    <option value="moonshot-v1-32k">moonshot-v1-32k</option>
                    <option value="moonshot-v1-128k" selected>moonshot-v1-128k (推荐)</option>
                </select>
                <span style="font-size:0.8em;color:#7f8c8d; margin-left:5px;">
                    (安全批次: <span id="batch-size-display">80</span> 条/次)
                </span>
            </div>
        </div>

        <div class="options-container">
            <div class="option-row">
                <span class="option-label-title">🔄 翻译方向：</span>
                <label class="radio-label">
                    <input type="radio" name="trans-direction" value="en2zh" checked> 英译中
                </label>
                <label class="radio-label">
                    <input type="radio" name="trans-direction" value="zh2en"> 中译英
                </label>
            </div>
            <div class="option-row">
                <span class="option-label-title">📝 输出格式：</span>
                <label class="radio-label">
                    <input type="radio" name="output-format" value="bilingual" checked> 保留双语
                </label>
                <label class="radio-label">
                    <input type="radio" name="output-format" value="zh-only"> 仅保留中文
                </label>
                <label class="radio-label">
                    <input type="radio" name="output-format" value="en-only"> 仅保留英文
                </label>
            </div>
        </div>

        <div id="drop-zone">将 Excel 文件拖拽至此，或点击上传</div>
        <input type="file" id="file-input" style="display:none" accept=".xlsx">

        <div id="progress-area" class="progress-container">
            <div class="status-text">
                <span id="status-msg">准备就绪</span>
                <span id="status-percent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>
            <div id="counter-detail" style="font-size:0.8em;color:#95a5a6;margin-top:5px;"></div>
            <div class="time-info">
                <span id="estimated-time">⏱ 预计耗时：--</span>
                <span id="elapsed-time">⏳ 总用时：--</span>
                <span id="translated-count">✅ 已翻译：0 / 0</span>
            </div>
        </div>

        <div class="info">
            <strong>智能excel翻译工具：</strong> 保留excel公式、原格式不变；<br>
            <strong>专业词汇：</strong> 严格遵循 COTO/SANS 标准，强制使用英式拼写；<br>
            <strong>智能排版：</strong> 原文与译文同单元格双语对照，保持自动换行。<br>
            <strong>新增规则：</strong> 数字、日期、时间、金额、代码、编号等由模型自动识别并保持原样，不翻译。
        </div>

        <div class="footer"> <strong>© 汤剑辉 20260303</strong></div>
    </div>

    <script>
        const translationCache = new Map();

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const progressArea = document.getElementById('progress-area');
        const progressFill = document.getElementById('progress-fill');
        const statusMsg = document.getElementById('status-msg');
        const statusPercent = document.getElementById('status-percent');
        const counterDetail = document.getElementById('counter-detail');
        const apiKeyInput = document.getElementById('api-key');
        const modelSelect = document.getElementById('model-select');
        const testBtn = document.getElementById('btn-test-api');
        const testResult = document.getElementById('test-result');
        const estimatedTimeSpan = document.getElementById('estimated-time');
        const elapsedTimeSpan = document.getElementById('elapsed-time');
        const translatedCountSpan = document.getElementById('translated-count');
        const batchSizeDisplay = document.getElementById('batch-size-display');

        const savedKey = localStorage.getItem('kimi_api_key');
        if (savedKey) apiKeyInput.value = savedKey;
        apiKeyInput.addEventListener('input', () => {
            localStorage.setItem('kimi_api_key', apiKeyInput.value.trim());
        });

        function getBatchSize(model) {
            if (model === 'moonshot-v1-128k') return 80;
            if (model === 'moonshot-v1-32k') return 50;
            return 30;
        }
        function updateBatchDisplay() {
            batchSizeDisplay.textContent = getBatchSize(modelSelect.value);
        }
        modelSelect.addEventListener('change', updateBatchDisplay);
        updateBatchDisplay();

        testBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                testResult.textContent = '❌ 请先输入 API Key';
                testResult.className = 'test-result error';
                return;
            }
            testBtn.disabled = true;
            testResult.textContent = '⏳ 测试中...';
            testResult.className = 'test-result';

            try {
                const response = await fetch('https://api.moonshot.cn/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: [
                            { role: 'system', content: 'You are a helpful assistant.' },
                            { role: 'user', content: 'Hello, please reply with "OK" only.' }
                        ],
                        temperature: 0
                    })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);
                
                testResult.textContent = '✅ 连接成功！API 可用';
                testResult.className = 'test-result success';
            } catch (err) {
                testResult.textContent = '❌ 连接失败：' + err.message;
                testResult.className = 'test-result error';
            } finally {
                testBtn.disabled = false;
            }
        });

        function cleanText(text) {
            return (!text || typeof text !== 'string') ? '' : text.trim(); 
        }

        const systemPromptEn2Zh =
            `你是一名精通南非公路与桥梁工程的资深翻译专家，尤其熟悉 SANRAL、COTO、COLTO、SANS 标准。
            请将以下英文工程文本翻译为中文。要求：
            1. 术语精准，符合国际大型公路工程习惯（如中国交建等央企习惯）。
            2. 专用名词严格按南非规范（例如 "kerb" 译"路缘石"，"access road" 译"便道"）。
            3. 必须返回一个合法的 JSON 纯字符串数组，不要包含任何 Markdown 格式包裹（严禁使用 \`\`\`json 标记），不要添加任何解释或额外文字。
            4. 数组元素数量和顺序必须与输入文本完全一一对应。
            5. 如果输入的文本内部含有换行符，译文中对应的位置也请保留换行符。
            6. ★ 对于纯数字、日期、时间、金额、工程代码、编号、百分比等，请保持原样输出，不要翻译。`;

        const systemPromptZh2En =
            `你是一名精通南非公路与桥梁工程的资深翻译专家，尤其熟悉 SANRAL、COTO、COLTO、SANS 标准。
            请将以下中文工程文本翻译为英文。要求：
            1. 必须使用英式/南非英语拼写（如 "kerb" 而非 "curb"）。
            2. 术语严格符合南非道路施工规范（COTO）。
            3. 遇到"便道"必须译为 "Access Road"，禁止译为 "Service Road"。
            4. 必须返回一个合法的 JSON 纯字符串数组，不要包含任何 Markdown 格式包裹（严禁使用 \`\`\`json 标记），不要添加任何解释或额外文字。
            5. 数组元素数量和顺序必须与输入文本完全一一对应。
            6. 如果输入的文本内部含有换行符，译文中对应的位置也请保留换行符。
            7. ★ 对于纯数字、日期、时间、金额、工程代码、编号、百分比等，请保持原样输出，不要翻译。`;

        async function translateSingle(text, direction, apiKey, model) {
            try {
                const response = await fetch('https://api.moonshot.cn/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: 'system', content: direction === 'en2zh' ? systemPromptEn2Zh : systemPromptZh2En },
                            { role: 'user', content: JSON.stringify([text]) }
                        ],
                        temperature: 0.1
                    })
                });
                if (!response.ok) return null;
                const data = await response.json();
                if (data.error) return null;
                
                const raw = data.choices[0].message.content.trim();
                let parsed;
                try { parsed = JSON.parse(raw); } 
                catch(e) {
                    const startIdx = raw.indexOf('['), endIdx = raw.lastIndexOf(']');
                    if (startIdx !== -1 && endIdx > startIdx) {
                        try { parsed = JSON.parse(raw.substring(startIdx, endIdx + 1)); } catch(e2) { return null; }
                    } else return null;
                }
                const val = parsed[0];
                return typeof val === 'string' ? val : (val && typeof val === 'object' ? (val.text || JSON.stringify(val)) : String(val || ''));
            } catch (e) { return null; }
        }

        async function translateBatch(texts, direction, apiKey, model) {
            if (!texts || texts.length === 0) return [];

            const validTexts = [], validIndices = [];
            texts.forEach((t, idx) => {
                const cleaned = cleanText(t);
                if (cleaned) { validTexts.push(cleaned); validIndices.push(idx); }
            });
            if (validTexts.length === 0) return texts.map(() => null);

            const results = new Array(texts.length).fill(null);
            const needTranslate = [], needIndices = [];
            
            validIndices.forEach((idx, pos) => {
                const key = validTexts[pos] + '|' + direction;
                if (translationCache.has(key)) results[idx] = translationCache.get(key);
                else { needTranslate.push(validTexts[pos]); needIndices.push(idx); }
            });

            if (needTranslate.length === 0) return results;
            if (needTranslate.length === 1) {
                const res = await translateSingle(needTranslate[0], direction, apiKey, model);
                if (res !== null) { translationCache.set(needTranslate[0] + '|' + direction, res); results[needIndices[0]] = res; }
                return results;
            }

            try {
                const response = await fetch('https://api.moonshot.cn/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: model,
                        messages: [
                            { role: 'system', content: direction === 'en2zh' ? systemPromptEn2Zh : systemPromptZh2En },
                            { role: 'user', content: JSON.stringify(needTranslate) }
                        ],
                        temperature: 0.1
                    })
                });

                if (!response.ok) return await splitAndRetry(needTranslate, needIndices, direction, apiKey, model, results);
                const data = await response.json();
                if (data.error) return await splitAndRetry(needTranslate, needIndices, direction, apiKey, model, results);

                const raw = data.choices[0].message.content.trim();
                let parsed;
                try { parsed = JSON.parse(raw); } 
                catch (e) {
                    const s = raw.indexOf('['), eIdx = raw.lastIndexOf(']');
                    if (s !== -1 && eIdx > s) {
                        try { parsed = JSON.parse(raw.substring(s, eIdx + 1)); } catch (err) { return await splitAndRetry(needTranslate, needIndices, direction, apiKey, model, results); }
                    } else return await splitAndRetry(needTranslate, needIndices, direction, apiKey, model, results);
                }

                if (!Array.isArray(parsed) || parsed.length !== needTranslate.length) return await splitAndRetry(needTranslate, needIndices, direction, apiKey, model, results);

                for (let i = 0; i < needTranslate.length; i++) {
                    const val = parsed[i];
                    const translatedStr = typeof val === 'string' ? val : (val && typeof val === 'object' ? (val.text || JSON.stringify(val)) : String(val || ''));
                    translationCache.set(needTranslate[i] + '|' + direction, translatedStr);
                    results[needIndices[i]] = translatedStr;
                }
                return results;
            } catch (err) { return await splitAndRetry(needTranslate, needIndices, direction, apiKey, model, results); }
        }

        async function splitAndRetry(needTranslate, needIndices, direction, apiKey, model, results) {
            if (needTranslate.length <= 1) {
                if (needTranslate.length === 1) {
                    const res = await translateSingle(needTranslate[0], direction, apiKey, model);
                    if (res !== null) { translationCache.set(needTranslate[0] + '|' + direction, res); results[needIndices[0]] = res; }
                }
                return results;
            }
            const mid = Math.floor(needTranslate.length / 2);
            const leftRes = await translateBatch(needTranslate.slice(0, mid), direction, apiKey, model);
            const rightRes = await translateBatch(needTranslate.slice(mid), direction, apiKey, model);

            for (let i = 0; i < leftRes.length; i++) if (leftRes[i] !== null) results[needIndices.slice(0, mid)[i]] = leftRes[i];
            for (let i = 0; i < rightRes.length; i++) if (rightRes[i] !== null) results[needIndices.slice(mid)[i]] = rightRes[i];
            return results;
        }

        async function processExcel(file) {
            const direction = document.querySelector('input[name="trans-direction"]:checked').value;
            const outputFormat = document.querySelector('input[name="output-format"]:checked').value;
            
            progressArea.style.display = 'block';
            statusMsg.innerText = '正在智能解析 Excel 数据结构...';
            statusMsg.style.color = '#34495e';
            progressFill.style.width = '0%';
            statusPercent.innerText = '0%';
            counterDetail.innerText = '';
            estimatedTimeSpan.textContent = '⏱ 预计耗时：计算中...';
            elapsedTimeSpan.textContent = '⏳ 总用时：--';
            translatedCountSpan.textContent = '✅ 已处理：0 / 0';

            const startTime = Date.now();

            try {
                const workbook = new ExcelJS.Workbook();
                await workbook.xlsx.load(file);
                const items = [];
                workbook.eachSheet((sheet) => {
                    sheet.eachRow((row) => {
                        row.eachCell({ includeEmpty: false }, (cell) => {
                            if (cell.value !== null && cell.value !== undefined) {
                                if (cell.value instanceof Date) return;
                                const text = cell.text;
                                if (typeof text === 'string' && text.trim() !== '' && !cell.formula) {
                                    items.push({ cell, text: text.trim() });
                                }
                            }
                        });
                    });
                });

                const total = items.length;
                if (total === 0) {
                    statusMsg.innerText = '未找到任何有效的文本单元格。';
                    statusMsg.style.color = '#f39c12';
                    elapsedTimeSpan.textContent = '⏳ 总用时：0s';
                    return;
                }

                const model = modelSelect.value;
                const BATCH_SIZE = getBatchSize(model);
                const chunks = [];
                for (let i = 0; i < items.length; i += BATCH_SIZE) chunks.push(items.slice(i, i + BATCH_SIZE));

                const CONCURRENCY_LIMIT = 3; 
                let chunkIndex = 0, completed = 0, successCount = 0;
                const apiKey = apiKeyInput.value.trim();
                if (!apiKey) throw new Error('请填写 Kimi API Key');

                // 核心修改：由于网络波动和排队，原理论预估时间乘以 10 倍以贴近实际情况
                let estSec = ((chunks.length * 1.8) / CONCURRENCY_LIMIT) * 10;
                estimatedTimeSpan.textContent = `⏱ 预计耗时：${estSec < 60 ? Math.round(estSec)+'秒' : Math.floor(estSec/60)+'分'+Math.round(estSec%60)+'秒'}`;
                statusMsg.innerText = '高速翻译处理中...';

                async function worker() {
                    while (chunkIndex < chunks.length) {
                        const currentIdx = chunkIndex++; 
                        if (currentIdx >= chunks.length) break;

                        const batchItems = chunks[currentIdx];
                        const texts = batchItems.map(item => item.text);
                        let translations;
                        
                        try { translations = await translateBatch(texts, direction, apiKey, model); } 
                        catch (e) { translations = texts.map(() => null); }

                        for (let j = 0; j < batchItems.length; j++) {
                            const { cell, text } = batchItems[j];
                            const translated = translations[j];
                            
                            if (translated !== null && translated !== undefined && translated.trim() !== '') {
                                let chinese, english;
                                if (direction === 'en2zh') { 
                                    chinese = translated; 
                                    english = text; 
                                } else { 
                                    chinese = text; 
                                    english = translated; 
                                }
                                
                                // 检查翻译结果是否与原文一致（代表纯数字、金额、日期、工程编号等不翻译的部分）
                                if (chinese.trim() === english.trim()) {
                                    // 翻译结果一致，直接跳过不执行 cell.value 的重写，保护底层数据类型
                                    successCount++;
                                } else {
                                    try {
                                        let finalOutput = '';
                                        if (outputFormat === 'bilingual') {
                                            finalOutput = `${chinese}\n${english}`;
                                        } else if (outputFormat === 'zh-only') {
                                            finalOutput = chinese;
                                        } else if (outputFormat === 'en-only') {
                                            finalOutput = english;
                                        }

                                        cell.value = finalOutput;
                                        
                                        if (outputFormat === 'bilingual') {
                                            if (!cell.alignment) cell.alignment = { wrapText: true };
                                            else cell.alignment.wrapText = true;
                                        }
                                        successCount++;
                                    } catch (writeErr) {
                                        console.error('底册单元格数据写入异常:', writeErr);
                                    }
                                }
                            }
                            completed++;
                            
                            const pct = Math.round((completed / total) * 100);
                            progressFill.style.width = pct + '%';
                            statusPercent.innerText = pct + '%';
                            counterDetail.innerText = `已扫描: ${completed} / ${total} 单元格`;
                            translatedCountSpan.textContent = `✅ 已处理：${successCount} / ${total}`;
                        }
                        await new Promise(resolve => setTimeout(resolve, 400));
                    }
                }

                const workerPool = [];
                for (let k = 0; k < Math.min(CONCURRENCY_LIMIT, chunks.length); k++) workerPool.push(worker());
                await Promise.all(workerPool);

                if (successCount === 0) {
                    statusMsg.innerText = '❌ 处理结束，未能成功修改任何单元格。';
                    statusMsg.style.color = '#e74c3c';
                } else {
                    statusMsg.innerText = '✅ 处理大功告成！正在准备打包下载...';
                    statusMsg.style.color = '#27ae60';
                }

                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                
                const baseName = file.name.replace(/\.xlsx$/i, '');
                let formatSuffix = "双语";
                if (outputFormat === "zh-only") formatSuffix = "纯中文";
                if (outputFormat === "en-only") formatSuffix = "纯英文";
                a.download = `${baseName}_${formatSuffix}_N3.xlsx`;
                
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => window.URL.revokeObjectURL(url), 10000);

                const elapsed = (Date.now() - startTime) / 1000;
                elapsedTimeSpan.textContent = `⏳ 总用时：${elapsed < 60 ? elapsed.toFixed(1)+'秒' : Math.floor(elapsed/60)+'分'+Math.round(elapsed%60)+'秒'}`;

            } catch (err) {
                statusMsg.innerText = '❌ 异常中断：' + err.message;
                statusMsg.style.color = '#e74c3c';
            }
        }

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = '#d6eaf8'; };
        dropZone.ondragleave = () => { dropZone.style.background = '#ebf5fb'; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.background = '#ebf5fb';
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                fileInput.dispatchEvent(new Event('change'));
            }
        };

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                alert('请先在上方输入有效的 Kimi API Key 密钥！');
                fileInput.value = '';
                return;
            }
            await processExcel(file);
            fileInput.value = '';
        };
    </script>
</body>
</html>
